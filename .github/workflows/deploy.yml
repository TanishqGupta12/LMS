name: Deploy to EC2

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-ec2
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Validate secrets
        run: |
          if [ -z "${{ secrets.EC2_HOST }}" ] || [ -z "${{ secrets.EC2_SSH_KEY }}" ]; then
            echo "Missing EC2_HOST or EC2_SSH_KEY secret"
            exit 1
          fi

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          passphrase: ${{ secrets.EC2_SSH_PASSPHRASE }}
          script_stop: true
          script: |
            set -euo pipefail

            APP_DIR=${{ vars.EC2_APP_DIR }}

            if [ ! -d "$APP_DIR/.git" ]; then
              echo "Repo not found. Cloning..."
              rm -rf "$APP_DIR"
              git clone https://github.com/TanishqGupta12/LMS.git "$APP_DIR"
            fi

            cd "$APP_DIR"

            git pull origin main

            docker compose down
            docker compose up -d --build --remove-orphans