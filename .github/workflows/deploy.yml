name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Push code from the runner (GITHUB_TOKEN) so EC2 never needs git@github.com credentials
      - name: Rsync to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          set -e
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/ec2_deploy
          chmod 600 ~/.ssh/ec2_deploy
          ssh-keyscan -t rsa,ecdsa,ed25519 "$EC2_HOST" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/ec2_deploy -o IdentitiesOnly=yes" \
            --exclude '.git/' \
            --exclude 'node_modules/' \
            --exclude 'log/' \
            --exclude 'tmp/' \
            --exclude '.bundle/' \
            --exclude '.env' \
            --exclude '.env.*' \
            --exclude 'config/master.key' \
            --exclude 'config/credentials/*.key' \
            ./ "${EC2_USER}@${EC2_HOST}:/home/ubuntu/LMS/"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -e

            echo "🔄 Ensure app directory ownership"
            sudo chown -R ubuntu:ubuntu /home/ubuntu/LMS

            echo "🧹 Cleaning Docker (free space)"
            docker system prune -af || true
            docker volume prune -f || true

            echo "📂 Navigate to app"
            cd /home/ubuntu/LMS || exit 1

            echo "🛑 Stop old containers"
            docker compose down || true

            echo "🚀 Build & start containers"
            DOCKER_BUILDKIT=1 docker compose up -d --build --remove-orphans

            echo "🧹 Final cleanup"
            docker image prune -af || true
