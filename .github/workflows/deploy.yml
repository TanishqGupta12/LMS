name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Rsync to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          set -e

          echo "🔑 Writing SSH key..."
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/ec2_deploy
          chmod 600 ~/.ssh/ec2_deploy

          echo "🔍 Validate key format..."
          ssh-keygen -y -f ~/.ssh/ec2_deploy > /dev/null && echo "Key OK" || { echo "Key is INVALID"; exit 1; }

          echo "🌐 Scanning host keys for $EC2_HOST..."
          ssh-keyscan -t rsa,ecdsa,ed25519 "$EC2_HOST" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

          echo "🔗 Test SSH connection..."
          ssh -i ~/.ssh/ec2_deploy -o IdentitiesOnly=yes -o StrictHostKeyChecking=no \
            "${EC2_USER}@${EC2_HOST}" "echo SSH OK"

          echo "🔧 Fix ownership on destination before rsync..."
          ssh -i ~/.ssh/ec2_deploy -o IdentitiesOnly=yes -o StrictHostKeyChecking=no \
            "${EC2_USER}@${EC2_HOST}" "sudo chown -R ${EC2_USER}:${EC2_USER} /home/${EC2_USER}/LMS || true"

          echo "📦 Rsyncing files..."
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/ec2_deploy -o IdentitiesOnly=yes -o StrictHostKeyChecking=no" \
            --exclude '.git/' \
            --exclude 'node_modules/' \
            --exclude 'log/' \
            --exclude 'tmp/' \
            --exclude '.bundle/' \
            --exclude '.env' \
            --exclude '.env.*' \
            --exclude 'config/master.key' \
            --exclude 'config/credentials/*.key' \
            ./ "${EC2_USER}@${EC2_HOST}:/home/ubuntu/LMS/"

      - name: Install dependencies on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 10m
          script: |
            if ! command -v docker &> /dev/null; then
              echo "Installing Docker..."
              sudo apt-get update -qq
              sudo apt-get remove -y containerd containerd.io docker docker-engine docker.io runc 2>/dev/null || true
              sudo apt-get install -y ca-certificates curl gnupg lsb-release
              sudo install -m 0755 -d /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg
              sudo chmod a+r /etc/apt/keyrings/docker.gpg
              echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
              sudo apt-get update -qq
              sudo apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
              sudo systemctl enable --now docker
              sudo usermod -aG docker $USER
              echo "Docker installed: $(docker --version)"
            else
              echo "Docker already installed: $(docker --version)"
            fi
      
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -e

            echo "🔄 Ensure app directory ownership"
            sudo chown -R ubuntu:ubuntu /home/ubuntu/LMS

            echo "🌐 Setup nginx"
            sudo apt-get install -y nginx
            sudo cp /home/ubuntu/LMS/deploy/nginx-lms.conf /etc/nginx/sites-available/lms
            sudo ln -sf /etc/nginx/sites-available/lms /etc/nginx/sites-enabled/
            sudo rm -f /etc/nginx/sites-enabled/default
            sudo nginx -t && sudo systemctl enable --now nginx

            echo "🧹 Clean up disk space"
            docker system prune -af || true
            docker volume prune -f || true
            sudo apt-get clean
            sudo apt-get autoremove -y
            sudo journalctl --vacuum-time=2d || true

            echo "📂 Navigate to app"
            cd /home/ubuntu/LMS || exit 1

            echo "🛑 Stop old containers"
            docker compose down || true

            echo "🚀 Build & start containers"
            DOCKER_BUILDKIT=1 docker compose up -d --build --remove-orphans

            echo "🧹 Final image cleanup"
            docker image prune -af || true
