# SQLite. Versions 3.8.0 and up are supported.
#   gem install sqlite3
#
#   Ensure the SQLite 3 gem is defined in your Gemfile
#   gem "sqlite3"
#
default: &default
  adapter: sqlite3
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000

development:
  primary:
    <<: *default
    adapter: mysql2   # Use the mysql2 adapter for MySQL
    host: <%= ENV.fetch('DB_HOST', 'localhost') %>
    port: <%= ENV.fetch('DB_PORT', '3306').to_i %>
    username: <%= ENV.fetch('DB_USER', 'root') %>
    password: <%= ENV.fetch('DB_PASSWORD', 'root@123') %>
    database: <%= ENV.fetch('DB_NAME', 'myapp_development') %>
    encoding: utf8mb4
    charset: utf8mb4

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
# test:
#   <<: *default
#   database: storage/test.sqlite3

production:
  primary:
    <<: *default
    adapter: mysql2
    host: <%= ENV.fetch('DB_HOST', 'localhost') %>
    port: <%= ENV.fetch('DB_PORT', '3306').to_i %>
    username: <%= ENV.fetch('DB_USER', 'root') %>
    password: <%= ENV.fetch('DB_PASSWORD', '') %>
    database: <%= ENV.fetch('DB_NAME', 'lms_production') %>
    encoding: utf8mb4
    charset: utf8mb4
