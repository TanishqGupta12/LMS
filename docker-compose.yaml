services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-lms_secret}
      MYSQL_DATABASE: ${DB_NAME:-lms_production}
    volumes:
      - mysql_data:/var/lib/mysql
    # Host port defaults to 3307 so it does not clash with a local MySQL on 3306
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 30s

  web:
    build: .
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      RAILS_ENV: production
      DB_HOST: db
      DB_PORT: "3306"
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-lms_secret}
      DB_NAME: ${DB_NAME:-lms_production}
      RUN_DB_SEED: ${RUN_DB_SEED:-true}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:-dev_only_change_me_use_rails_secret_for_real_deployments_0123456789abcdef}
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
